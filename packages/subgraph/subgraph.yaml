specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: BountyEscrow
    network: base
    source:
      address: "0x1005c4231E5A687F41A15277cEc416d4A9D3649e"
      abi: BountyEscrow
      startBlock: 44470571
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Bounty
      abis:
        - name: BountyEscrow
          file: ./abis/BountyEscrow.json
      eventHandlers:
        - event: BountyCreated(indexed uint256,indexed address,uint256,uint256)
          handler: handleBountyCreated
        - event: BountyCancelled(indexed uint256)
          handler: handleBountyCancelled
        - event: DevApproved(indexed uint256,indexed address,uint256)
          handler: handleDevApproved
        - event: BondStaked(indexed uint256,indexed address,uint256)
          handler: handleBondStaked
        - event: DeliverableSubmitted(indexed uint256,string)
          handler: handleDeliverableSubmitted
        - event: DeliverableApproved(indexed uint256)
          handler: handleDeliverableApproved
        - event: DeliverableRejected(indexed uint256)
          handler: handleDeliverableRejected
        - event: BountyExpired(indexed uint256)
          handler: handleBountyExpired
        - event: BountyResolved(indexed uint256,uint8)
          handler: handleBountyResolved
      file: ./src/bounty-escrow.ts

  - kind: ethereum
    name: DisputeResolver
    network: base
    source:
      address: "0xF7bBF83bdA864b7298eeBfB509c887033226FaB4"
      abi: DisputeResolver
      startBlock: 44470571
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Dispute
        - Vote
        - DisputeVoter
      abis:
        - name: DisputeResolver
          file: ./abis/DisputeResolver.json
      eventHandlers:
        - event: DisputeOpened(indexed uint256,uint256)
          handler: handleDisputeOpened
        - event: VoteCast(indexed uint256,uint256)
          handler: handleVoteCast
        - event: DisputeResolved(indexed uint256,uint8)
          handler: handleDisputeResolved
        - event: DisputeExtended(indexed uint256,uint256)
          handler: handleDisputeExtended
        - event: DisputeEscalated(indexed uint256)
          handler: handleDisputeEscalated
        - event: VoterJoinedDispute(indexed uint256,indexed bytes32,uint256)
          handler: handleVoterJoinedDispute
      file: ./src/dispute-resolver.ts
